<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Restablecer contraseña | Citas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./css/app.css" rel="stylesheet" />
  </head>
  <body>
    <header class="site-top px-4">
      <div class="container d-flex justify-content-between align-items-center">
        <div class="h5 mb-0">Dental Llamas</div>
        <div>
          <a class="btn btn-outline-light btn-sm" href="./login.html">Volver a login</a>
        </div>
      </div>
    </header>

    <main class="clinic-shell py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-10 col-lg-6">
            <div class="auth-card card border-0 shadow-sm">
              <div class="card-body p-4 p-md-5">
                <div class="mb-4">
                  <h1 class="h3 page-title mb-2">Restablecer contraseña</h1>
                  <p class="text-muted mb-0">Ingresa tu teléfono y la nueva contraseña.</p>
                </div>
                <div data-reset-feedback class="mb-3"></div>
                <form data-reset-form class="d-grid gap-3" novalidate>
                  <div>
                    <label class="form-label" for="reset-phone">Número de teléfono</label>
                    <input class="form-control" id="reset-phone" name="phone" type="tel" inputmode="tel" placeholder="ej. 3123456789" />
                  </div>
                  <div>
                    <label class="form-label" for="reset-password">Nueva contraseña</label>
                    <input class="form-control" id="reset-password" name="newPassword" type="password" placeholder="Mínimo 6 caracteres" />
                    <button class="btn btn-sm btn-outline-secondary mt-2" type="button" data-toggle-password data-target="#reset-password">Mostrar contraseña</button>
                  </div>
                  <button class="btn btn-primary btn-lg" type="submit">Restablecer</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="site-bottom">
      <div class="container d-flex justify-content-between">
        <div>Monteczuma 94, Pihuamo, Jalisco</div>
        <div>Tel: </div>
      </div>
    </footer>
    <script type="module" src="./js/reset-password.js"></script>
  </body>
</html>
