<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panel admin | Citas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./css/app.css" rel="stylesheet" />
</head>

<body>
    <main class="clinic-shell py-5">
        <div class="container">
            <header class="site-top px-4">
                <div class="container d-flex justify-content-between align-items-center">
                    <div class="h5 mb-0">Dental Llamas</div>
                    <div class="d-flex align-items-center gap-2">
                        <button id="logout-btn" class="btn btn-light btn-sm text-dark">Cerrar sesión</button>
                    </div>
                </div>
            </header>
                        <div class="container"></div>
                <div class="card-body">
                    <h2 class="h6 mb-3">Crear cita manual</h2>
                    <form id="admin-create-form" class="row g-3">
                        <div class="col-12 col-md-4">
                            <input class="form-control" name="name" placeholder="Nombre" required />
                        </div>
                        <div class="col-12 col-md-3">
                            <input class="form-control" name="phone" placeholder="Teléfono (opcional)"
                                inputmode="tel" />
                        </div>
                        <div class="col-12 col-md-2">
                            <input class="form-control" name="date" type="date" required />
                        </div>
                        <div class="col-12 col-md-2">
                            <input class="form-control" name="time" type="time" required />
                        </div>
                        <div class="col-12 col-md-12">
                            <input class="form-control" name="description" placeholder="Descripción (opcional)" />
                        </div>
                        <div class="col-12 text-end">
                            <button class="btn btn-sm btn-primary" type="submit">Crear cita</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="row g-3" data-admin-appointments-list></div>
        </div>
        <footer class="site-bottom">
            <div class="container"></div>
        </footer>
    </main>
    <script type="module" src="./js/admin.js"></script>
</body>

</html>
