<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panel admin | Citas activas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./css/app.css" rel="stylesheet" />
</head>

<body data-admin-page="active">
    <main class="clinic-shell py-5">
        <div class="container">
            <header class="site-top px-4">
                <div class="container-fluid admin-navbar d-flex flex-wrap justify-content-between align-items-center gap-3">
                    <a class="admin-navbar-brand fw-semibold" href="./admin-appointments.html">Dental Llamas</a>
                    <div class="admin-nav-links">
                        <a class="admin-nav-link active" href="./admin-appointments.html">Citas activas</a>
                        <a class="admin-nav-link" href="./admin-history.html">Historial</a>
                        <a class="admin-nav-link" href="./admin-records.html">Expediente clínico</a>
                        <button id="logout-btn" class="btn btn-light btn-sm text-dark rounded-pill px-3">Cerrar sesión</button>
                    </div>
                </div>
            </header>
            <div class="admin-page-intro p-4 mb-4 mt-4">
                <h1 class="h3 page-title mb-2">Citas activas</h1>
               
            </div>
            <div data-admin-feedback class="mb-3"></div>
            <div class="card border-0 shadow-sm mb-4 admin-page-card">
                <div class="card-body">
                    <h2 class="h6 mb-3">Crear cita manual</h2>
                    <form id="admin-create-form" class="row g-3">
                        <div class="col-12 col-md-4">
                            <input class="form-control" name="name" placeholder="Nombre" required />
                        </div>
                        <div class="col-12 col-md-3">
                            <input class="form-control" name="phone" placeholder="Teléfono" inputmode="tel" required />
                        </div>
                        <div class="col-12 col-md-2">
                            <input class="form-control" name="date" type="date" required />
                        </div>
                        <div class="col-12 col-md-2">
                            <input class="form-control" name="time" type="time" required />
                        </div>
                        <div class="col-12 col-md-12">
                            <input class="form-control" name="description" placeholder="Descripción (opcional)" />
                        </div>
                        <div class="col-12 text-center text-md-end">
                            <button class="btn btn-sm btn-primary rounded-pill px-4" type="submit">Crear cita</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="row g-3" data-admin-appointments-list></div>
        </div>
        <footer class="site-bottom">
            <div class="container"></div>
        </footer>
    </main>
    <script type="module" src="./js/admin.js"></script>
</body>

</html>
