<!DOCTYPE html>

<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Iniciar Sesión - EventMaster</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="js/tailwind-config.js" id="tailwind-config"></script>
    <link rel="stylesheet" href="style/main.css">
</head>

<body
    class="bg-surface-container-low text-on-surface min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop antialiased">
    <main class="w-full max-w-[440px]">
        <div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-8 shadow-sm">
            <div class="text-center mb-8">
                <div class="flex justify-center items-center gap-2 mb-4">
                    <span class="material-symbols-outlined text-primary text-3xl"
                        style="font-variation-settings: 'FILL' 1;">event_available</span>
                    <h1 class="font-headline-sm text-headline-sm text-primary font-bold">EventMaster</h1>
                </div>
                <h2 class="font-headline-md text-headline-md text-on-surface mb-2">Iniciar Sesión</h2>
                <p class="font-body-sm text-body-sm text-secondary">Accede al panel de control de logística.</p>
            </div>
            <form class="flex flex-col gap-6">
                <div class="flex flex-col gap-stack-sm">
                    <label class="font-label-md text-label-md text-on-surface" for="email">Correo Electrónico</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">Email</span>
                        <input
                            class="w-full h-12 pl-10 pr-4 bg-surface-container-lowest border border-outline-variant rounded font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                            id="email" name="email" placeholder="RamirezAnguiano@ucol.mx" required="" type="email" />
                    </div>
                </div>
                <div class="flex flex-col gap-stack-sm">
                    <div class="flex justify-between items-center">
                        <label class="font-label-md text-label-md text-on-surface" for="password">Contraseña</label>
                        <a class="font-body-sm text-body-sm text-primary hover:text-on-primary-fixed-variant hover:underline transition-colors"
                            href="#">Olvide mi contraseña</a>
                    </div>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
                        <input
                            class="w-full h-12 pl-10 pr-4 bg-surface-container-lowest border border-outline-variant rounded font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                            id="password" name="password" placeholder="••••••••" required="" type="password" />
                    </div>
                </div>
                <!-- Primary Action Button -->
                <button
                    class="w-full h-12 mt-2 bg-primary text-on-primary font-label-md text-label-md rounded hover:bg-on-primary-fixed-variant transition-colors flex items-center justify-center gap-2"
                    type="submit">
                    Ingresar al Sistema
                    <span class="material-symbols-outlined" style="font-size: 1.25rem;">login</span>
                </button>
            </form>
            <!-- Secondary Actions -->
            <div class="mt-8 pt-6 border-t border-outline-variant text-center">
                <p class="font-body-sm text-body-sm text-secondary">
                    ¿No tienes una cuenta?
                    <a class="font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant hover:underline transition-colors ml-1"
                        href="registro.html">Crear cuenta</a>
                </p>
            </div>
            <script src="mock/administrators.js"></script>
            <script src="js/login.js"></script>
        </div>
        <div class="text-center mt-6">
            <p class="font-body-sm text-body-sm text-outline">
                © 2026 EventMaster Enterprise. Todos los derechos reservados.
            </p>
        </div>
    </main>
</body>
</html>
