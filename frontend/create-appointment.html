<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agendar cita | Citas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./css/app.css" rel="stylesheet" />
  </head>
  <body>
    <header class="site-top px-4">
      <div class="container d-flex justify-content-between align-items-center">
        <div class="h5 mb-0">Clínica X</div>
        <button type="button" class="site-nav-toggle btn btn-light btn-sm d-md-none" data-site-nav-toggle aria-expanded="false" aria-label="Mostrar menú">
          <span class="hamburger-icon"></span>
        </button>
        <div class="site-nav-links align-items-center gap-2" data-site-nav-links>
          <a class="btn btn-outline-light btn-sm" href="./profile.html">Mi perfil</a>
          <a class="btn btn-outline-light btn-sm" href="./appointments.html">Ver mis citas</a>
          <button id="logout-btn" class="btn btn-light btn-sm text-dark">Cerrar sesión</button>
        </div>
      </div>
    </header>

    <main class="clinic-shell py-5">
      <div class="container create-appointment-card">
        <div class="mb-4">
          <h1 class="h3 page-title mb-2">Crear cita</h1>
          <p class="text-muted mb-0">Selecciona fecha y hora; la descripción es opcional.</p>
          <div id="admin-appointment-help" class="text-muted small mt-2 d-none">Como administrador, esta cita se asignará a otro usuario. Ingresa el nombre y teléfono del paciente.</div>
          <div id="schedule-info" class="small mt-2 p-2 border rounded bg-light d-none"></div>
        </div>
        <div data-create-feedback class="mb-3"></div>
        <form data-appointment-create-form class="d-grid gap-3" novalidate>
          <div id="admin-user-fields" class="row g-3 d-none">
            <div class="col-12 col-md-6">
              <label class="form-label" for="user-name">Nombre del paciente</label>
              <input class="form-control" id="user-name" name="name" type="text" placeholder="Nombre completo" aria-label="Nombre del paciente" />
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label" for="user-phone">Teléfono del paciente</label>
              <input class="form-control" id="user-phone" name="phone" type="tel" inputmode="tel" placeholder="ej. +52 3123456789" aria-label="Teléfono del paciente" />
            </div>
          </div>
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label" for="date">Fecha</label>
              <div class="text-primary fw-bold mb-2">Fecha de la cita</div>
              <input class="form-control" id="date" name="date" type="date" placeholder="Fecha de la cita" title="Fecha de la cita" aria-label="Fecha de la cita" />
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label" for="time">Hora</label>
              <div class="text-primary fw-bold mb-2">Hora de la cita</div>
              <select class="form-select" id="time" name="time" aria-label="Hora de la cita">
                <option value="" disabled selected>Selecciona fecha</option>
              </select>
            </div>
          </div>
          <div>
            <label class="form-label" for="description">Descripción opcional</label>
            <textarea class="form-control" id="description" name="description" rows="4" placeholder="Motivo de la cita"></textarea>
          </div>
          <button class="btn btn-primary btn-lg" type="submit">Agendar cita</button>
        </form>
      </div>
      <footer class="site-bottom">
        <div class="container"></div>
      </footer>
    </main>
    <script type="module" src="./js/create-appointment.js?v=4"></script>
  </body>
</html>
