<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Horario | Clínica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./css/app.css" rel="stylesheet" />
  </head>
  <body>
    <header class="site-top px-4">
      <div class="container d-flex justify-content-between align-items-center">
        <div class="h5 mb-0">Clínica X</div>
        <button type="button" class="site-nav-toggle btn btn-light btn-sm d-md-none" data-site-nav-toggle aria-expanded="false" aria-label="Mostrar menú">
          <span class="hamburger-icon"></span>
        </button>
        <div class="site-nav-links align-items-center gap-2" data-site-nav-links>
          <a class="btn btn-outline-light btn-sm" href="./profile.html">Mi perfil</a>
          <a class="btn btn-outline-light btn-sm" href="./appointments.html">Citas activas</a>
          <a class="btn btn-outline-light btn-sm" href="./create-appointment.html">Nueva cita</a>
          <button id="logout-btn" class="btn btn-light btn-sm text-dark">Cerrar sesión</button>
        </div>
      </div>
    </header>

    <main class="clinic-shell py-5">
      <div class="container" style="max-width: 800px;">
        <div class="mb-5 mt-3">
          <h1 class="page-title mb-2">Horario de atención</h1>
          <p class="text-muted" style="font-size: 1.2rem;">Consulta los días y horarios disponibles para agendar tu cita.</p>
        </div>

        <div data-schedule-feedback class="mb-3"></div>

        <div class="admin-page-intro p-5 mb-4" id="schedule-display" style="display: none;">
          <div class="d-flex align-items-start gap-4 flex-column flex-md-row">
            <div style="font-size: 3rem; line-height: 1;">🕐</div>
            <div>
              <div id="schedule-text" style="font-size: 1.6rem; font-weight: 700; line-height: 1.5; color: #fff;"></div>
              <div id="exceptions-text" class="mt-3" style="font-size: 1rem; color: var(--clinic-text-secondary);"></div>
            </div>
          </div>
        </div>

        <div id="no-schedule" class="admin-page-intro p-5 text-center" style="display: none;">
          <div style="font-size: 3rem; line-height: 1; margin-bottom: 1rem;">📅</div>
          <p style="font-size: 1.4rem; font-weight: 600; color: #fff;">No hay horario registrado</p>
          <p class="text-muted" style="font-size: 1rem;">El consultorio aún no ha configurado sus horarios de atención.</p>
        </div>

        <footer class="site-bottom">
          <div class="container"></div>
        </footer>
      </div>
    </main>
    <script type="module" src="./js/schedule.js?v=2"></script>
  </body>
</html>
