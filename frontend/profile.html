<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Perfil | Clínica X</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./css/app.css" rel="stylesheet" />
  </head>
  <body>
    <main class="clinic-shell py-5">
      <div class="container">
        <header class="site-top px-4">
          <div class="container d-flex justify-content-between align-items-center">
            <div class="h5 mb-0">Clínica X</div>
            <button type="button" class="site-nav-toggle btn btn-light btn-sm d-md-none" data-site-nav-toggle aria-expanded="false" aria-label="Mostrar menú">
              <span class="hamburger-icon"></span>
            </button>
            <div class="site-nav-links align-items-center gap-2" data-site-nav-links>
              <a class="btn btn-outline-light btn-sm" href="./appointments.html">Inicio</a>
              <a class="btn btn-outline-light btn-sm" href="./history.html">Ver mis citas</a>
              <button id="logout-btn" class="btn btn-light btn-sm text-dark">Cerrar sesión</button>
            </div>
          </div>
        </header>

        <div class="mb-4 mt-4">
          <h1 class="h3 page-title mb-2">Mi perfil</h1>
          <p class="text-muted mb-0">Revisa y actualiza tu información de registro.</p>
        </div>

        <div data-profile-feedback class="mb-3"></div>

        <form data-profile-form class="row g-3" novalidate>
          <div class="col-12 col-md-6">
            <label class="form-label" for="profile-name">Nombre completo</label>
            <input class="form-control" id="profile-name" name="name" type="text" placeholder="Tu nombre" required />
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label" for="profile-country-code">Lada</label>
            <select class="form-select" id="profile-country-code" name="country_code" aria-label="Lada de país"></select>
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label" for="profile-phone">Número local</label>
            <input class="form-control" id="profile-phone" name="phone" type="tel" placeholder="3123456789" required />
            <div class="form-text">Solo el número sin lada.</div>
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label" for="profile-birthdate">Fecha de nacimiento</label>
            <input class="form-control" id="profile-birthdate" name="birthdate" type="date" />
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label" for="profile-sex">Sexo</label>
            <select class="form-select" id="profile-sex" name="sex">
              <option value="" disabled selected>Selecciona</option>
              <option value="F">Femenino</option>
              <option value="M">Masculino</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label" for="profile-weight">Peso (kg)</label>
            <input class="form-control" id="profile-weight" name="weight" type="number" step="0.1" placeholder="Ej. 70.5" />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label" for="profile-occupation">Ocupación</label>
            <input class="form-control" id="profile-occupation" name="occupation" type="text" placeholder="Ej. Estudiante" />
          </div>
          <div class="col-12">
            <label class="form-label" for="profile-allergies">Alergias</label>
            <input class="form-control" id="profile-allergies" name="allergies" type="text" placeholder="Describe si aplica" />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label" for="profile-blood_type">Tipo de sangre</label>
            <input class="form-control" id="profile-blood_type" name="blood_type" type="text" placeholder="Ej. O+" />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label" for="profile-chronic_conditions">Condiciones crónicas</label>
            <input class="form-control" id="profile-chronic_conditions" name="chronic_conditions" type="text" placeholder="Ej. Diabetes" />
          </div>
          <div class="col-12">
            <label class="form-label" for="profile-clinical_observations">Observaciones clínicas</label>
            <textarea class="form-control" id="profile-clinical_observations" name="clinical_observations" rows="4" placeholder="Notas opcionales"></textarea>
          </div>
          <div class="col-12 text-end">
            <button class="btn btn-primary" type="submit">Guardar perfil</button>
          </div>
        </form>

        <footer class="site-bottom mt-4">
          <div class="container">Teléfono: 000-000-0000 · Dirección: Calle Ejemplo 123</div>
        </footer>
      </div>
    </main>
    <script type="module" src="./js/profile.js"></script>
  </body>
</html>
