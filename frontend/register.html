<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registro | Citas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./css/app.css" rel="stylesheet" />
  </head>
  <body>
    <header class="site-top px-4">
      <div class="container d-flex justify-content-between align-items-center">
        <div class="h5 mb-0">Dental Llamas</div>
        <div>
          <a class="btn btn-outline-light btn-sm" href="./index.html">Inicio</a>
        </div>
      </div>
    </header>

    <main class="clinic-shell py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-10 col-lg-6">
            <div class="auth-card card border-0 shadow-sm">
              <div class="card-body p-4 p-md-5">
                <div class="mb-4">
                  <p class="text-uppercase text-muted small mb-1">Nuevo usuario</p>
                  <h1 class="h3 page-title mb-2">Crear cuenta</h1>
                  <p class="text-muted mb-0">Regístrate con teléfono, nombre y contraseña.</p>
                </div>
                <div data-register-feedback class="mb-3"></div>
                <form data-register-form class="d-grid gap-3" novalidate>
                  <div>
                    <label class="form-label" for="reg-phone">Número de teléfono</label>
                    <input class="form-control" id="reg-phone" name="phone" type="tel" inputmode="tel" placeholder="Número con 10 dígitos" />
                  </div>
                  <div>
                    <label class="form-label" for="reg-name">Nombre</label>
                    <input class="form-control" id="reg-name" name="name" type="text" placeholder="Tu nombre" />
                  </div>
                  <div>
                    <label class="form-label" for="reg-password">Contraseña</label>
                    <input class="form-control" id="reg-password" name="password" type="password" placeholder="Mínimo 6 caracteres" />
                  </div>
                  <button class="btn btn-primary btn-lg" type="submit">Registrarme</button>
                  <p class="text-center mb-0 text-muted">¿Ya tienes cuenta? <a href="./login.html">Inicia sesión</a></p>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="site-bottom">
      <div class="container d-flex justify-content-between">
        <div>Monteczuma 94, Pihuamo, Jalisco</div>
        <div>Tel: </div>
      </div>
    </footer>
    <script type="module" src="./js/register.js"></script>
  </body>
</html>
