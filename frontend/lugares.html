<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lugares - EventMaster</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body class="p-8 bg-gray-50">
  <main class="max-w-2xl mx-auto bg-white p-6 rounded shadow">
    <h1 class="text-2xl font-bold mb-4">Registrar Lugar</h1>
    <form action="#" method="POST" class="space-y-4">
      <div>
        <label class="block mb-1 font-medium">Nombre</label>
        <input class="w-full border rounded px-3 py-2" name="nombre" required />
      </div>
      <div>
        <label class="block mb-1 font-medium">Dirección</label>
        <input class="w-full border rounded px-3 py-2" name="direccion" />
      </div>
      <div>
        <label class="block mb-1 font-medium">Capacidad</label>
        <input type="number" class="w-full border rounded px-3 py-2" name="capacidad" />
      </div>
      <button class="bg-blue-600 text-white px-4 py-2 rounded">Guardar</button>
    </form>
  </main>
</body>
</html>
