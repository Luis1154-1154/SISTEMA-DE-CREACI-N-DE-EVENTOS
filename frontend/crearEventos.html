<!DOCTYPE html>

<head>

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
    <nav class="bg-surface-container-lowest border-b border-outline-variant w-full top-0 z-50">
        <div
            class="flex justify-between items-center w-full px-margin-desktop py-4 max-w-container-max-width mx-auto md:px-margin-desktop px-margin-mobile">
            <div class="flex items-center gap-2">
                <span class="font-headline-sm text-headline-sm font-bold text-primary">EventMaster</span>
            </div>
            <div class="hidden md:flex gap-8 items-center">
                <a class="text-secondary hover:text-primary transition-colors duration-200 font-body-md text-body-md hover:bg-surface-container-low px-3 py-2 rounded-lg"
                    href="eventos.html">Eventos</a>
                <a class="text-primary border-b-2 border-primary pb-1 font-bold font-body-md text-body-md hover:bg-surface-container-low px-3 py-2 rounded-lg"
                    href="crearEventos.html">Crear Eventos</a>
            </div>
        </div>
    </nav>
    <main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop">
        <div
            class="w-full max-w-3xl bg-surface-container-lowest border border-outline-variant rounded-xl p-8 md:p-12 shadow-sm">
            <div class="mb-8">
                <h1 class="font-headline-md text-headline-md text-on-surface mb-2">Crear Nuevo Evento</h1>
                <p class="font-body-md text-body-md text-on-surface-variant">Llena el formulario para crear tu evento.</p>
            </div>
            <form class="space-y-6">
                <div>
                    <label class="block font-label-md text-label-md text-on-surface mb-2" for="eventName">Nombre del
                        evento</label>
                    <input
                        class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                        id="eventName" placeholder="Ej. Huelga Telematontos" type="text" />
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block font-label-md text-label-md text-on-surface mb-2"
                            for="eventDate">Fecha</label>
                        <input
                            class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                            id="eventDate" type="date" />
                    </div>
                    <div>
                        <label class="block font-label-md text-label-md text-on-surface mb-2"
                            for="eventTime">Hora</label>
                        <input
                            class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                            id="eventTime" type="time" />
                    </div>
                </div>
                <div>
                    <label class="block font-label-md text-label-md text-on-surface mb-2"
                        for="eventLocation">Ubicación</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-3 text-outline">location_on</span>
                        <input
                            class="w-full bg-surface border border-outline-variant rounded-lg pl-10 pr-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                            id="eventLocation" placeholder="Dirección o enlace virtual" type="text" />
                    </div>
                </div>
                <div>
                    <label class="block font-label-md text-label-md text-on-surface mb-2" for="eventGuests">Invitados
                        (Capacidad Máxima)</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-3 text-outline">group</span>
                        <input
                            class="w-full bg-surface border border-outline-variant rounded-lg pl-10 pr-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                            id="eventGuests" placeholder="Ej. 150" type="number" />
                    </div>
                </div>
                <div>
                    <label class="block font-label-md text-label-md text-on-surface mb-2"
                        for="eventDescription">Descripción (Opcional)</label>
                    <textarea
                        class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                        id="eventDescription" placeholder="Detalles adicionales sobre el evento..." rows="4"></textarea>
                </div>
                <div class="flex flex-col sm:flex-row justify-end gap-4 pt-6 border-t border-outline-variant">
                    <button
                        class="px-6 py-3 rounded-lg border border-outline text-secondary font-label-md text-label-md hover:bg-surface-container-low transition-colors w-full sm:w-auto"
                        type="button">
                        Cancelar
                    </button>
                    <button
                        class="px-6 py-3 rounded-lg bg-primary text-on-primary font-label-md text-label-md hover:bg-primary-container transition-colors w-full sm:w-auto"
                        type="submit">
                        Crear evento
                    </button>
                </div>
            </form>
        </div>
    </main>
    <footer class="bg-surface-container-lowest border-t border-outline-variant w-full mt-auto">
        <div
            class="flex flex-col md:flex-row justify-between items-center w-full px-margin-desktop py-8 max-w-container-max-width mx-auto gap-4">
            <span class="font-label-md text-label-md font-bold text-on-surface">© 2026 EventMaster Enterprise. Todos los derechos reservados.</span>
            <div class="flex gap-6">

                    href="#">Politicas de Privacidad</a>
                <a class="font-body-sm text-body-sm text-secondary hover:text-primary hover:underline transition-colors"
                    href="#">Terminos del Servicio</a>
                <a class="font-body-sm text-body-sm text-secondary hover:text-primary hover:underline transition-colors"
                    href="#">Soporte</a>
                <a class="font-body-sm text-body-sm text-secondary hover:text-primary hover:underline transition-colors"
                    href="#">Contacto</a>
            </div>
        </div>
    </footer>
</body>

</html>
