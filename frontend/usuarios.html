<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuarios - EventMaster</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body class="p-8 bg-gray-50">
  <main class="max-w-2xl mx-auto bg-white p-6 rounded shadow">
    <h1 class="text-2xl font-bold mb-4">Registrar Usuario</h1>
    <form action="#" method="POST" class="space-y-4">
      <div>
        <label class="block mb-1 font-medium">Nombre</label>
        <input class="w-full border rounded px-3 py-2" name="nombre" required />
      </div>
      <div>
        <label class="block mb-1 font-medium">Email</label>
        <input type="email" class="w-full border rounded px-3 py-2" name="email" required />
      </div>
      <div>
        <label class="block mb-1 font-medium">Contraseña</label>
        <input type="password" class="w-full border rounded px-3 py-2" name="contrasena" required />
      </div>
      <div>
        <label class="block mb-1 font-medium">Rol</label>
        <select name="rol" class="w-full border rounded px-3 py-2">
          <option value="participante">Participante</option>
          <option value="organizador">Organizador</option>
          <option value="invitado">Invitado</option>
          <option value="administrador">Administrador</option>
        </select>
      </div>
      <button class="bg-blue-600 text-white px-4 py-2 rounded">Crear usuario</button>
    </form>
  </main>
</body>
</html>
