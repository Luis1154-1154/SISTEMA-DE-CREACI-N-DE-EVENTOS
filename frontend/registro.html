<!DOCTYPE html>

<head>
    <meta charset="utf-8" />

                        "on-secondary-fixed-variant": "#3f484f",
                        "on-tertiary": "#ffffff",

                        "secondary-fixed": "#dbe4ed",

    <style>
        .form-control:focus {
            color: #181c20;
            background-color: #ffffff;
            border-color: #0057cd;
            outline: 0;
            box-shadow: 0 0 0 0.25rem rgba(0, 87, 205, 0.25);
        }

        .form-label {
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .btn-primary {
            color: #ffffff;
            background-color: #0057cd;
            border-color: #0057cd;
            display: inline-block;
            font-weight: 600;
            line-height: 1.5;
            text-align: center;
            text-decoration: none;
            vertical-align: middle;
            cursor: pointer;
            user-select: none;
            border: 1px solid transparent;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            border-radius: 0.25rem;
            transition: color 0.15s ease-in-out, background-color 0.15s ease-in-out, border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
            height: 48px;
        }

        .btn-primary:hover {
            color: #ffffff;
            background-color: #00419e;
            border-color: #00419e;
        }

        .card {
            position: relative;
            display: flex;
            flex-direction: column;
            min-width: 0;
            word-wrap: break-word;
            background-color: #ffffff;
            background-clip: border-box;
            border: 1px solid #e0e3e8;
            border-radius: 0.5rem;
        }

        .card-body {
            flex: 1 1 auto;
            padding: 2rem;
        }

        .card-header {
            padding: 1rem 2rem;
            margin-bottom: 0;
            background-color: #f1f4f9;
            border-bottom: 1px solid #e0e3e8;
            border-top-left-radius: 0.5rem;
            border-top-right-radius: 0.5rem;
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
    <main class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop">
        <div class="w-full max-w-md mx-auto">
            <div class="text-center mb-8">
                <h1 class="font-headline-lg text-headline-lg text-primary mb-2 hidden md:block">EventMaster</h1>
                <h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2 md:hidden">EventMaster</h1>
                <p class="font-body-lg text-body-lg text-on-surface-variant">Crea tu cuenta para empezar a administrar
                    tus eventos.</p>
            </div>
            <div class="card shadow-sm border-outline-variant mx-auto">
                <div class="card-header border-outline-variant bg-surface-container-low text-center">
                    <h2 class="font-headline-sm text-headline-sm text-on-surface">Registro</h2>
                </div>
                <div class="card-body">
                    <form id="registerForm" action="#" class="flex flex-col gap-4 w-full md:w-3/4 mx-auto" method="POST">
                        <div>
                            <label class="form-label font-label-md text-label-md text-on-surface" for="fullName">Nombre
                                Completo</label>
                            <input class="form-control" id="fullName" name="fullName" placeholder="Ramirez Anguiano" required=""
                                type="text" />
                        </div>
                        <div>
                            <label class="form-label font-label-md text-label-md text-on-surface" for="email">Correo Electronico</label>
                            <input class="form-control" id="email" name="email" placeholder="RamirezAnguiano@ucol.mx"
                                required="" type="email" />
                        </div>
                        <div>
                            <label class="form-label font-label-md text-label-md text-on-surface"
                                for="password">Contraseña</label>
                            <input class="form-control" id="password" name="password" placeholder="••••••••" required=""
                                type="password" />
                            <div class="mt-1 font-body-sm text-body-sm text-secondary">Debe de tener al menos 8
                                caracteres de largo.</div>
                        </div>
                        <div>
                            <label class="form-label font-label-md text-label-md text-on-surface" for="rol">Rol</label>
                            <select id="rol" name="rol" class="form-control">
                                <option value="participante">Participante</option>
                                <option value="organizador">Organizador</option>
                                <option value="invitado">Invitado</option>
                                <option value="administrador">Administrador</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label font-label-md text-label-md text-on-surface"
                                for="confirmPassword">Confirmar Contraseña</label>
                            <input class="form-control" id="confirmPassword" name="confirmPassword"
                                placeholder="••••••••" required="" type="password" />
                        </div>
                        <div class="flex items-start mt-2">
                            <div class="flex items-center h-5">
                                <input
                                    class="w-4 h-4 border border-outline-variant rounded bg-surface-container-lowest focus:ring-3 focus:ring-primary-container text-primary"
                                    id="terms" name="terms" required="" type="checkbox" />
                            </div>
                            <label class="ml-2 font-body-sm text-body-sm text-on-surface-variant" for="terms">
                                Acepto los <a class="text-primary hover:underline font-semibold" href="#">Terminos de
                                    servicio</a> y la <a class="text-primary hover:underline font-semibold"
                                    href="#">Politica de privacidad</a>.
                            </label>
                        </div>
                        <button class="btn-primary w-full mt-4 flex justify-center items-center gap-2" type="submit">
                            <span>Crear Cuenta</span>
                            <span class="material-symbols-outlined"
                                style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
                        </button>
                    </form>
                    <script>
                        // Save simple mock user and set role as 'logged in' on registration
                        (function () {
                            const form = document.getElementById('registerForm');
                            form.addEventListener('submit', function (e) {
                                e.preventDefault();
                                const fullName = document.getElementById('fullName').value;
                                const email = document.getElementById('email').value;
                                const password = document.getElementById('password').value;
                                const rol = document.getElementById('rol').value || 'participante';

                                // store in localStorage.users (simple mock)
                                const key = 'users_mock_v1';
                                let users = JSON.parse(localStorage.getItem(key) || '[]');
                                // avoid duplicates: replace if email exists
                                users = users.filter(u => u.email !== email);
                                users.push({ name: fullName, email: email, password: password, rol: rol });
                                localStorage.setItem(key, JSON.stringify(users));

                                // set current session
                                localStorage.setItem('userRole', rol);
                                localStorage.setItem('currentUserEmail', email);

                                // redirect to eventos (simulate auto-login)
                                window.location.href = 'eventos.html';
                            });
                        })();
                    </script>
                </div>
                <div class="p-4 border-t border-outline-variant bg-surface-container-lowest text-center rounded-b-lg">
                    <p class="font-body-md text-body-md text-on-surface-variant">
                        Ya tienes una cuenta? <a class="text-primary font-bold hover:underline" href="#">Iniciar
                            Sesión</a>
                    </p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
