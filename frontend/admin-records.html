<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panel admin | Expediente clínico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./css/app.css" rel="stylesheet" />
</head>

<body data-admin-page="records">
    <main class="clinic-shell py-5">
        <div class="container">
            <header class="site-top px-4">
                <div class="container-fluid admin-navbar d-flex flex-wrap justify-content-between align-items-center gap-3">
                    <a class="admin-navbar-brand fw-semibold" href="./admin-appointments.html">Dental Llamas</a>
                    <div class="admin-nav-links">
                        <a class="admin-nav-link" href="./admin-appointments.html">Citas activas</a>
                        <a class="admin-nav-link" href="./admin-history.html">Historial</a>
                        <a class="admin-nav-link active" href="./admin-records.html">Expediente clínico</a>
                        <button id="logout-btn" class="btn btn-light btn-sm text-dark rounded-pill px-3">Cerrar sesión</button>
                    </div>
                </div>
            </header>
            <div class="admin-page-intro p-4 mb-4 mt-4">
                <h1 class="h3 page-title mb-2">Expediente clínico</h1>
                <p class="text-muted mb-0">Selecciona un usuario para ver su historial, editar registros y agregar nuevas citas al expediente.</p>
            </div>
            <div data-records-feedback class="mb-3"></div>
            <div class="row g-4">
                <div class="col-12 col-lg-4">
                    <section class="card border-0 shadow-sm h-100 admin-page-card record-user-panel">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
                                <div>
                                    <p class="text-uppercase text-muted small mb-1">Usuarios registrados</p>
                                    <h2 class="h5 mb-0">Lista ordenada</h2>
                                </div>
                                <span class="badge text-bg-primary rounded-pill">Plataforma</span>
                            </div>
                            <div class="list-group record-user-list" data-records-users></div>
                        </div>
                    </section>
                </div>
                <div class="col-12 col-lg-8">
                    <section class="card border-0 shadow-sm h-100 admin-page-card record-detail-panel">
                        <div class="card-body" data-records-detail>
                            <div class="text-center text-muted py-5">
                                <h2 class="h5 mb-2">Selecciona un usuario</h2>
                                <p class="mb-0">Aquí aparecerá su expediente clínico editable.</p>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
        <footer class="site-bottom">
            <div class="container"></div>
        </footer>
    </main>
    <script type="module" src="./js/admin.js"></script>
</body>

</html>
