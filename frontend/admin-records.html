<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panel admin | Expediente clínico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./css/app.css" rel="stylesheet" />
</head>

<body data-admin-page="records">
    <main class="clinic-shell py-5">
        <div class="container">
            <header class="site-top px-4">
                <div class="container-fluid admin-navbar d-flex flex-wrap justify-content-between align-items-center gap-3">
                    <a class="admin-navbar-brand fw-semibold" href="./admin-appointments.html">Clínica X</a>
                    <button type="button" id="admin-nav-toggle" class="admin-navbar-toggle btn btn-light btn-sm d-md-none" data-site-nav-toggle aria-expanded="false" aria-label="Mostrar menú">
                        <span class="hamburger-icon"></span>
                    </button>
                    <div class="admin-nav-links" data-site-nav-links>
                        <a class="admin-nav-link" href="./admin-appointments.html">Citas activas</a>
                        <a class="admin-nav-link" href="./admin-history.html">Historial</a>
                        <a class="admin-nav-link active" href="./admin-records.html">Expediente clínico</a>
                        <a class="admin-nav-link" href="./admin-schedule.html">Agenda</a>
                        <button id="logout-btn" class="btn btn-light btn-sm text-dark rounded-pill px-3">Cerrar sesión</button>
                    </div>
                </div>
            </header>
            <div class="admin-page-intro p-4 mb-4 mt-4">
                <h1 class="h3 page-title mb-0">Expediente clínico</h1>
            </div>
            <div data-records-feedback class="mb-3"></div>
            <div class="row g-4">
                <div class="col-12 col-lg-4">
                    <section class="card border-0 shadow-sm h-100 admin-page-card record-user-panel">
                        <div class="card-body">
                            <div class="list-group record-user-list" data-records-users></div>
                        </div>
                    </section>
                </div>
                <div class="col-12 col-lg-8">
                    <section class="card border-0 shadow-sm h-100 admin-page-card record-detail-panel">
                        <div class="card-body" data-records-detail>
                            <div class="text-center text-muted py-5"></div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
        <footer class="site-bottom">
            <div class="container"></div>
        </footer>
    </main>
    <script type="module" src="./js/admin.js"></script>
</body>

</html>
